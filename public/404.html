<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fix: redirect all 404s to index.html with the original path preserved
      const path = window.location.pathname.replace(/\/personal-trainer\//g, '/personal-trainer/#/');
      window.location.replace(path);
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
